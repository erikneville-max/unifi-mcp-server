name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run Safety check
        run: |
          source .venv/bin/activate
          safety check --json --output safety-report.json
        continue-on-error: true  # safety check deprecated in safety>=3.0; pip-audit below is the gate

      - name: Run pip-audit
        run: |
          source .venv/bin/activate
          # pip-audit is already in dev deps (installed via uv above); using pip here
          # would pull in py==1.11.0 via pip's resolver, introducing PYSEC-2022-42969.
          # PYSEC-2022-42969 / CVE-2022-42969: ReDoS in py's SVN info parsing.
          # No fix version exists; py is unmaintained. This project does not use SVN,
          # so the vulnerability is not exploitable here.
          pip-audit --format json --output pip-audit-report.json \
            --ignore-vuln PYSEC-2022-42969

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('safety-report.json') != ''
        with:
          name: safety-report
          path: safety-report.json
          if-no-files-found: ignore

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('pip-audit-report.json') != ''
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: ignore

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --baseline .secrets.baseline --all-files

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        if: github.event_name == 'pull_request'
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

  bandit-scan:
    name: Bandit Security Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run Bandit
        run: |
          source .venv/bin/activate
          bandit -r src/ -f json -o bandit-report.json -ll -ii

      - name: Run Bandit SARIF
        run: |
          source .venv/bin/activate
          pip install bandit[sarif]
          bandit -r src/ -f sarif -o bandit-results.sarif -ll -ii
        continue-on-error: true  # SARIF upload may fail on forks — scan result above is the gate

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('bandit-results.sarif') != ''
        with:
          sarif_file: bandit-results.sarif
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-full-report
          path: bandit-report.json

  trivy-scan:
    name: Trivy Security Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy JSON report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: unifi-mcp-server:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        if: success()
        with:
          image-ref: 'unifi-mcp-server:scan'
          format: 'sarif'
          output: 'trivy-docker-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy Docker scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-docker-results.sarif'
        continue-on-error: true

  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OSV Scanner
        run: |
          curl -L https://github.com/google/osv-scanner/releases/download/v1.9.0/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: Run OSV Scanner
        run: |
          ./osv-scanner --recursive --format sarif --output osv-results.sarif . || true
        continue-on-error: true

      - name: Upload OSV Scanner results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('osv-results.sarif') != ''
        with:
          sarif_file: osv-results.sarif
        continue-on-error: true

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [codeql, dependency-scan, secret-scanning, bandit-scan, trivy-scan, docker-scan, osv-scanner]
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "CodeQL:           ${{ needs.codeql.result }}"
          echo "Dependency Scan:  ${{ needs.dependency-scan.result }}"
          echo "Secret Scanning:  ${{ needs.secret-scanning.result }}"
          echo "Bandit:           ${{ needs.bandit-scan.result }}"
          echo "Trivy FS:         ${{ needs.trivy-scan.result }}"
          echo "Docker Scan:      ${{ needs.docker-scan.result }}"
          echo "OSV Scanner:      ${{ needs.osv-scanner.result }}"

      - name: Create security summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status | Blocking? |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} | ✅ Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan (Safety + pip-audit) | ${{ needs.dependency-scan.result }} | ✅ Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | ${{ needs.secret-scanning.result }} | ✅ Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit SAST | ${{ needs.bandit-scan.result }} | ✅ Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS | ${{ needs.trivy-scan.result }} | ⚠️ Report only |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Scan | ${{ needs.docker-scan.result }} | ⚠️ Report only |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV Scanner | ${{ needs.osv-scanner.result }} | ⚠️ Report only |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any blocking security scan failed
        if: |
          needs.codeql.result == 'failure' ||
          needs.dependency-scan.result == 'failure' ||
          needs.secret-scanning.result == 'failure' ||
          needs.bandit-scan.result == 'failure'
        run: |
          echo "One or more blocking security scans failed. Merge blocked."
          exit 1
